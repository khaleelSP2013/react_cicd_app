name: React App using github page

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Nodejs
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # install Dependencies
      - name: install Dependencies
        run: mpm install

      # Build the project
      - name: Build Project
        run: mpm run build

        # Deploy to the github pages
      - name: Deploy to the github pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          publish_dir: dist
